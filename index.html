<!DOCTYPE html>
<html>
<head>
<title>Drift-Street</title>

<style>
body{
margin:0;
overflow:hidden;
background:black;
font-family:Arial;
}

#menu{
position:absolute;
width:100%;
height:100%;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
background:black;
color:white;
z-index:10;
}

#menu h1{
font-size:60px;
}

#menu button{
padding:15px 40px;
font-size:20px;
cursor:pointer;
}

#hud{
position:absolute;
top:10px;
left:10px;
color:white;
font-size:20px;
z-index:5;
}
</style>

</head>

<body>

<div id="menu">
<h1>Drift-Street</h1>
<button onclick="startGame()">Start Game</button>
</div>

<div id="hud">
Score: <span id="score">0</span><br>
Nitro: <span id="nitro">100</span>
</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.152.2/build/three.min.js"></script>
<script src="game.js"></script>

</body>
</html>
