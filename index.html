<!DOCTYPE html>
<html>
<head>
<title>Drift-Street</title>

<style>

body{
margin:0;
overflow:hidden;
font-family:Arial;
}

#menu{
position:absolute;
width:100%;
height:100%;
background:black;
color:white;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
z-index:10;
}

#menu h1{
font-size:60px;
}

#menu button{
padding:15px 30px;
font-size:20px;
cursor:pointer;
}

#score{
position:absolute;
top:10px;
left:10px;
color:white;
font-size:24px;
}

</style>
</head>

<body>

<div id="menu">
<h1>Drift-Street</h1>
<button onclick="startGame()">Start Game</button>
</div>

<div id="score">Drift Score: 0</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.152.2/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.152.2/examples/js/loaders/GLTFLoader.js"></script>

<script>

let scene, camera, renderer, car
let speed = 0
let keys = {}

let driftScore = 0
let scoreDisplay = document.getElementById("score")

function startGame(){

document.getElementById("menu").style.display="none"

scene = new THREE.Scene()

camera = new THREE.PerspectiveCamera(
75,
window.innerWidth/window.innerHeight,
0.1,
1000
)

renderer = new THREE.WebGLRenderer()
renderer.setSize(window.innerWidth,window.innerHeight)
document.body.appendChild(renderer.domElement)

let light = new THREE.DirectionalLight(0xffffff,1)
light.position.set(5,10,7)
scene.add(light)

let ambient = new THREE.AmbientLight(0x404040)
scene.add(ambient)

let roadGeometry = new THREE.PlaneGeometry(500,500)
let roadMaterial = new THREE.MeshStandardMaterial({color:0x333333})

let road = new THREE.Mesh(roadGeometry,roadMaterial)
road.rotation.x = -Math.PI/2
scene.add(road)

const loader = new THREE.GLTFLoader()

loader.load("ToyCar.glb", function(gltf){

car = gltf.scene
car.scale.set(0.5,0.5,0.5)
car.position.y = 0.2

scene.add(car)

})

camera.position.set(0,5,10)

document.addEventListener("keydown",e=>keys[e.key]=true)
document.addEventListener("keyup",e=>keys[e.key]=false)

animate()

}

function animate(){

requestAnimationFrame(animate)

if(!car) return

if(keys["ArrowUp"]) speed += 0.02
if(keys["ArrowDown"]) speed -= 0.02

speed *= 0.98

if(keys["ArrowLeft"]) car.rotation.y += 0.04
if(keys["ArrowRight"]) car.rotation.y -= 0.04

car.position.x -= Math.sin(car.rotation.y)*speed
car.position.z -= Math.cos(car.rotation.y)*speed

camera.position.x = car.position.x
camera.position.z = car.position.z + 10

camera.lookAt(car.position)

renderer.render(scene,camera)

}

</script>

</body>
</html>
